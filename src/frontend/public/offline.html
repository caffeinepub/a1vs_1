<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A1VS - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0fdf4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        background: #ffffff;
        border-radius: 16px;
        padding: 48px 32px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
        display: block;
      }
      .logo-text {
        color: #16a34a;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .logo-sub {
        color: #6b7280;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.5px;
        margin-bottom: 32px;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .retry-btn {
        background: #16a34a;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #15803d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="icon">📡</span>
      <div class="logo-text">A1VS</div>
      <div class="logo-sub">AONE VEGETABLES & SUPPLIER</div>
      <h1>You are offline</h1>
      <p>
        Please check your internet connection and try again. Your data is safe
        and will sync once you are back online.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        Try Again
      </button>
    </div>
  </body>
</html>
